services:
  agentlens:
    build: .
    image: agentlens:0.2.0
    container_name: agentlens
    restart: unless-stopped
    ports:
      - "8800:8800"
    environment:
      AGENTLENS_DATABASE_URL: ${AGENTLENS_DATABASE_URL:-sqlite:////data/agentlens.db}
    volumes:
      - agentlens-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8800/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

